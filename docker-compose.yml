# Deployment stack that pulls a published Strmline image from Docker Hub.
#


services:
  strmline:
    image: nepherius/strmline:latest
    user: "1000:1000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      STRMLINE_APP_SECRET_KEY: "CHANGE_ME_generate_a_long_random_secret"
      STRMLINE_POSTGRES_HOST: postgres
      STRMLINE_POSTGRES_PORT: 5432
      STRMLINE_POSTGRES_DATABASE: strmline
      STRMLINE_POSTGRES_USER: strmline
      STRMLINE_POSTGRES_PASSWORD: "CHANGE_ME_unique_database_password"
    ports:
      - "45733:45733"
    volumes:
      - strmline-config:/config
      - /mnt/strmline-library:/library # Mount your library here. Change this path to your library location.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:45733/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: strmline
      POSTGRES_USER: strmline
      POSTGRES_PASSWORD: "CHANGE_ME_unique_database_password"
    volumes:
      - strmline-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strmline -d strmline"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  strmline-config:
  strmline-postgres:
